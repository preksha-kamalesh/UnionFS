name: Mini-UnionFS CI/CD

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  # Build and test the Mini-UnionFS project
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v3
      
      # Build Docker image
      - name: Build Docker image
        run: docker build -t mini-unionfs .
      
      # Run automated tests in Docker
      - name: Run automated tests
        run: docker run --cap-add SYS_ADMIN --device /dev/fuse -v $(pwd):/unionfs mini-unionfs make test
      
      # Check code compilation
      - name: Verify clean build
        run: docker run --cap-add SYS_ADMIN --device /dev/fuse -v $(pwd):/unionfs mini-unionfs make clean && make
      
      # Test with docker-compose
      - name: Test with docker-compose
        run: |
          docker-compose build
          docker-compose up -d
          docker-compose exec -T unionfs make test
          docker-compose down

  # Code quality checks (optional)
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Check for compilation warnings
        run: docker build -t mini-unionfs . 2>&1 | grep -i warning || echo "No warnings found"
      
      - name: Verify file structure
        run: |
          test -f src/path_resolution.c || exit 1
          test -f src/directory_merge.c || exit 1
          test -f Makefile || exit 1
          test -f tests/test_unionfs.sh || exit 1
          echo "✓ All required files present"

  # Documentation checks
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Check documentation exists
        run: |
          test -f docs/DESIGN.md || exit 1
          test -f docs/TASK_PATH_RESOLUTION.md || exit 1
          test -f README.md || exit 1
          echo "✓ All documentation files present"
      
      - name: Verify documentation format
        run: |
          # Check for common markdown issues
          grep -q "^#" docs/DESIGN.md || exit 1
          grep -q "^#" docs/TASK_PATH_RESOLUTION.md || exit 1
          echo "✓ Documentation properly formatted"
